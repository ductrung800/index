<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="data:,">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playbook</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root{
    /* Site Standard Colors */
    --bg:#0a0e16; --panel:#101625; --panel2:#0d1220; --line:#212a3d; --line-soft:#1a2233;
    --text:#e7ebf3; --text-dim:#8b93a8; --text-faint:#59617a;
    --teal:#20d9b8; --amber:#f5b942; --red:#ff5c72; --purple:#a855f7; --blue:#38bdf8;
    --navy-head:#131c33; --heat-text:#12161f; --input-bg:#0d1220;

    /* Playbook Specific Maps */
    --chart-bg: #05070b;
    --scrollbar-thumb: var(--line);
    --scrollbar-thumb-hover: var(--text-faint);
    --placeholder-color: var(--text-faint);
    --selected-bg: rgba(32, 217, 184, 0.08);
    --selected-border: var(--teal);
  }
  html[data-theme="light"]{
    --bg:#f4f6fa; --panel:#ffffff; --panel2:#ffffff; --line:#dde2ec; --line-soft:#e9edf4;
    --text:#151b2c; --text-dim:#5b6478; --text-faint:#8a92a6;
    --teal:#0b9c82; --amber:#b9781a; --red:#c93a51; --purple:#8b5cf6; --blue:#0284c7;
    --navy-head:#eef1f8; --heat-text:#12161f; --input-bg:#f4f6fa;

    --chart-bg: #eef0f3;
    --selected-bg: rgba(11, 156, 130, 0.08);
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  
  body{
    background:
      radial-gradient(ellipse 1200px 500px at 15% -5%, rgba(32,217,184,.06), transparent 60%),
      radial-gradient(ellipse 900px 500px at 100% 0%, rgba(245,185,66,.05), transparent 55%),
      var(--bg);
    color:var(--text); 
    font-family:'Inter', sans-serif; 
    padding:22px 26px; 
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden; /* Crucial for app pane sizing */
    transition:background .2s ease, color .2s ease;
  }

  /* ---------- UNIFORM APP TABS ---------- */
  .app-tabs {
    display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--line);
    padding-bottom: 0; flex-wrap: nowrap; overflow-x: auto; flex-shrink: 0;
  }
  .app-tabs a {
    padding: 10px 18px; text-decoration: none; color: var(--text-dim); font-size: 11.5px;
    font-weight: 600; border: 1px solid transparent; border-bottom: none; border-radius: 8px 8px 0 0;
    text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }
  .app-tabs a.active { background: var(--panel); color: var(--teal); border-color: var(--line); border-bottom-color: var(--panel); margin-bottom: -1px; }
  .app-tabs a:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.03); }

  /* ---------- STANDARD SITE HEADER ---------- */
  header.top{display:flex; justify-content:space-between; align-items:flex-end; border-bottom:2px solid var(--line); padding-bottom:14px; margin-bottom:16px; gap:16px; flex-wrap:wrap; flex-shrink: 0;}
  .brand-eyebrow{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.18em; color:var(--teal); text-transform:uppercase;}
  h1{font-size:26px; font-weight:800; letter-spacing:-.02em; margin-top:2px;}
  .subline{color:var(--text-dim); font-size:12.5px; margin-top:4px; font-family:'JetBrains Mono',monospace;}
  .header-right{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  
  .theme-toggle{display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--line); border-radius:100px; padding:6px 6px; cursor:pointer;}
  .theme-toggle .opt{font-size:14px; padding:5px 11px; border-radius:100px; color:var(--text-faint); font-weight:600;}
  .theme-toggle .opt.active{background:var(--teal); color:#04150f;}

  .btn{background:var(--panel); border:1px solid var(--line); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:11.5px; padding:8px 14px; border-radius:7px; cursor:pointer; font-weight:600; transition:all .15s;}
  .btn:hover{border-color:var(--teal); color:var(--teal);}
  .btn.primary{background:var(--teal); color:#04150f; border-color:var(--teal);}
  .btn.primary:hover{filter:brightness(1.08); color:#04150f;}

  /* ---------- PLAYBOOK CORE LAYOUT ---------- */
  .playbook-app {
    flex: 1; min-height: 0; display: flex; 
    border: 1px solid var(--line); border-radius: 10px; 
    background: var(--panel); overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  }
  .sidebar {
    width: 300px; min-width: 300px; border-right: 1px solid var(--line);
    display: flex; flex-direction: column; background: var(--panel2);
  }
  .detail {
    flex: 1; min-width: 0; display: flex; flex-direction: column; 
    overflow-y: auto; background: var(--panel);
  }

  /* ---- Sidebar internals ---- */
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb); border-radius:4px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-thumb-hover);}

  .sidebar-head{padding:16px 14px 12px; border-bottom:1px solid var(--line-soft);}
  .search-wrap{position:relative;}
  .search-wrap svg{position:absolute; left:10px; top:50%; transform:translateY(-50%); opacity:.45; color:var(--text);}
  .search-wrap input{
    width:100%; background:var(--input-bg); border:1px solid var(--line);
    border-radius:7px; padding:8px 10px 8px 32px; color:var(--text);
    font-size:12.5px; font-family:'Inter', sans-serif; outline:none;
  }
  .search-wrap input:focus{border-color:var(--teal);}
  .filter-row{display:flex; gap:6px; margin-top:12px; flex-wrap:wrap;}
  .chip{
    font-family:'JetBrains Mono', monospace; font-size:10.5px; font-weight:600; letter-spacing:.03em;
    padding:5px 10px; border-radius:6px; border:1px solid var(--line);
    background:transparent; color:var(--text-dim); cursor:pointer; transition:.12s;
  }
  .chip:hover{border-color:var(--text-faint); color:var(--text);}
  .chip.active{
    background:color-mix(in srgb, var(--tagcolor, var(--teal)) 15%, transparent);
    border-color:color-mix(in srgb, var(--tagcolor, var(--teal)) 40%, transparent);
    color:var(--tagcolor, var(--teal));
  }
  .chip-manage{margin-left:auto; color:var(--text-dim);}
  .chip-manage:hover{color:var(--text);}
  .sort-row{margin-top:10px;}
  .sort-row select{
    width:100%; background:var(--input-bg); border:1px solid var(--line);
    color:var(--text-dim); font-size:11.5px; font-family:'Inter', sans-serif; font-weight:500;
    padding:7px 9px; border-radius:7px; outline:none; cursor:pointer;
  }

  .trade-list{flex:1; overflow-y:auto; padding:8px;}
  .trade-card{
    position:relative; padding:10px 12px 10px 15px; border-radius:8px; cursor:pointer;
    margin-bottom:4px; border:1px solid transparent; transition:.12s;
  }
  .trade-card:hover{background:var(--input-bg);}
  .trade-card.selected{background:var(--selected-bg); border-color:var(--selected-border);}
  .trade-card::before{
    content:''; position:absolute; left:2px; top:8px; bottom:8px; width:3px; border-radius:3px;
    background:var(--tagcolor, var(--text-faint));
  }
  .tc-top{display:flex; align-items:center; justify-content:space-between; gap:6px;}
  .tc-left{display:flex; align-items:center; gap:8px; min-width:0;}
  .tc-ticker{font-family:'JetBrains Mono', monospace; font-weight:800; font-size:14px; color:var(--text);}
  .tc-tag{
    font-family:'JetBrains Mono', monospace; font-size:9.5px; font-weight:700; padding:2px 6px; border-radius:4px;
    color:var(--tagcolor); background:color-mix(in srgb, var(--tagcolor) 15%, transparent);
    border:1px solid color-mix(in srgb, var(--tagcolor) 35%, transparent); cursor:pointer;
  }
  .tc-gain{font-family:'JetBrains Mono', monospace; font-weight:700; font-size:13.5px;}
  .tc-gain.pos{color:var(--teal);}
  .tc-gain.neg{color:var(--red);}
  .tc-bottom{display:flex; align-items:center; justify-content:space-between; margin-top:6px;}
  .tc-date{font-size:10.5px; color:var(--text-dim); font-family:'JetBrains Mono', monospace;}
  .tc-r{font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--text-dim);}
  .tc-bar-track{height:3px; background:var(--line); border-radius:2px; margin-top:8px; overflow:hidden;}
  .tc-bar-fill{height:100%; border-radius:2px; background:var(--tagcolor, var(--text-faint));}

  .empty-list{padding:30px 16px; text-align:center; color:var(--text-dim); font-size:12px; line-height:1.6;}

  /* ---- Detail pane internals ---- */
  .detail-empty{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--text-dim); gap:12px;
  }
  .detail-empty .big{font-family:'JetBrains Mono', monospace; font-size:14px; font-weight:700; color:var(--text-dim);}
  .detail-empty .small{font-size:12px; color:var(--text-faint); max-width:300px; text-align:center; line-height:1.6;}

  .detail-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 24px; border-bottom:1px solid var(--line); background:var(--navy-head);
  }
  .dh-left{display:flex; align-items:center; gap:12px;}
  .dh-ticker{font-family:'JetBrains Mono', monospace; font-weight:800; font-size:24px; color:var(--text);}
  .dh-meta{display:flex; align-items:center; gap:10px; margin-top:4px;}
  .dh-tag{
    font-family:'JetBrains Mono', monospace; font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px;
    color:var(--tagcolor); background:color-mix(in srgb, var(--tagcolor) 15%, transparent);
    border:1px solid color-mix(in srgb, var(--tagcolor) 35%, transparent); cursor:pointer;
  }
  .dh-date{font-size:11.5px; color:var(--text-dim); font-family:'JetBrains Mono', monospace;}
  .dh-gain{font-family:'JetBrains Mono', monospace; font-weight:800; font-size:26px;}
  .icon-btn{
    width:32px; height:32px; border-radius:7px; border:1px solid var(--line); background:var(--input-bg);
    color:var(--text-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.15s;
  }
  .icon-btn:hover{color:var(--red); border-color:var(--red); background:rgba(255,92,114,.1);}

  .detail-body{padding:20px 24px 34px; display:flex; flex-direction:column; gap:20px;}

  /* Image Compare Styles */
  .compare-frame{
    position:relative; width:100%; aspect-ratio:16/7; max-height:68vh; min-height:340px;
    border-radius:10px; overflow:hidden; border:1px solid var(--line); background:var(--panel2);
  }
  .compare-frame.split-mode{display:flex;}
  .split-half{
    flex:1; position:relative; display:flex; align-items:center; justify-content:center;
    overflow:hidden; cursor:pointer; background:var(--panel2); transition:.12s;
  }
  .split-half.dragover{background:rgba(32,217,184,.1);}
  .split-half img{width:100%; height:100%; object-fit:contain; background:var(--chart-bg); cursor:zoom-in; display:block;}
  .split-divider{flex:0 0 1px; background:var(--line);}
  .split-placeholder{display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--text-dim); text-align:center;}
  .split-placeholder svg{opacity:.5;}
  .split-placeholder .t1{font-size:12.5px; font-weight:600;}
  .split-placeholder .t2{font-size:11px; color:var(--text-faint);}

  .compare-frame.compare-mode{cursor:ew-resize; user-select:none; touch-action:none;}
  .compare-layer{position:absolute; inset:0;}
  .compare-layer img{width:100%; height:100%; object-fit:contain; background:var(--chart-bg); display:block; pointer-events:none;}
  .compare-layer.after-layer{z-index:1;}
  .compare-layer.before-layer{z-index:2;}
  .compare-handle{position:absolute; top:0; bottom:0; width:0; z-index:5; pointer-events:none;}
  .compare-handle::before{
    content:''; position:absolute; top:0; bottom:0; left:-1px; width:2px;
    background:var(--teal); box-shadow:0 0 10px rgba(32,217,184,.5);
  }
  .compare-grip{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:36px; height:36px; border-radius:50%; background:var(--panel); border:2px solid var(--teal);
    display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--teal);
  }
  .compare-badge{
    position:absolute; top:12px; z-index:6; font-family:'JetBrains Mono', monospace; font-size:10.5px; font-weight:700;
    padding:5px 10px; border-radius:6px; display:flex; align-items:center; gap:6px;
    background:var(--panel); border:1px solid var(--line); color:var(--text); pointer-events:none;
  }
  .compare-badge .bdot{width:7px; height:7px; border-radius:50%;}
  .badge-before{left:12px;}
  .badge-after{right:12px;}
  
  .compare-action-btn{
    position:absolute; bottom:12px; z-index:6; font-family:'Inter', sans-serif; font-size:11px; font-weight:600;
    background:var(--panel); color:var(--text); border:1px solid var(--line); padding:6px 12px; border-radius:6px; cursor:pointer;
  }
  .compare-action-btn:hover{border-color:var(--teal); color:var(--teal);}
  .action-before{left:12px;}
  .action-after{right:12px;}
  .compare-expand-btn{
    position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:6;
    width:30px; height:30px; border-radius:7px; background:var(--panel); color:var(--text); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px;
  }
  .compare-expand-btn:hover{border-color:var(--teal); color:var(--teal);}

  /* Stat Grids */
  .panel-row{display:flex; gap:18px; align-items:flex-start;}
  .panel-row > *{flex:1; min-width:0;}
  .stats-panel, .metrics-panel, .notes-panel{
    border:1px solid var(--line); border-radius:10px; background:var(--panel2); padding:16px 20px;
  }
  .panel-title{
    font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
    color:var(--text-dim); margin-bottom:14px; display:flex; align-items:center; gap:8px;
  }
  .panel-title .dot{width:7px; height:7px; border-radius:50%; background:var(--amber);}
  
  .stats-grid{display:grid; grid-template-columns:repeat(4, 1fr); gap:16px 20px;}
  .metrics-grid{display:grid; grid-template-columns:repeat(3, 1fr); gap:16px 20px;}
  
  .stat-cell label, .metric-cell label{
    display:block; font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:.05em; color:var(--text-dim);
    text-transform:uppercase; margin-bottom:6px; font-weight:700;
  }
  .stat-cell input, .metric-cell input, .stat-cell select{
    width:100%; background:transparent; border:none; border-bottom:1.5px solid var(--line);
    color:var(--text); font-family:'JetBrains Mono', monospace; font-size:15px; font-weight:700; padding:4px 0 6px; outline:none;
  }
  .stat-cell input::placeholder, .metric-cell input::placeholder{color:var(--placeholder-color); font-weight:500;}
  .stat-cell input:focus, .metric-cell input:focus, .stat-cell select:focus{border-bottom:1.5px solid var(--teal);}
  .stat-cell.wide, .metric-cell.wide{grid-column:span 2;}
  .metric-cell.wide{grid-column:span 3;}
  .stat-cell.neg input{color:var(--red);}
  .stat-cell.pos input{color:var(--teal);}
  .stat-cell.computed input{color:var(--blue); cursor:default; border-bottom-style:dashed;}
  .stat-cell.computed.neg input{color:var(--red);}
  .stat-cell.computed.pos input{color:var(--teal);}
  
  .auto-badge{
    font-family:'Inter', sans-serif; font-size:9px; font-weight:700; text-transform:none; letter-spacing:0;
    color:var(--blue); background:rgba(56, 189, 248, 0.15); border:1px solid rgba(56, 189, 248, 0.3);
    padding:2px 6px; border-radius:100px; margin-left:6px; vertical-align:middle;
  }

  .notes-panel textarea{
    width:100%; min-height:120px; background:var(--input-bg); border:1px solid var(--line); border-radius:8px; padding:12px; color:var(--text);
    font-family:'Inter', sans-serif; font-size:13.5px; font-weight:500; line-height:1.7; resize:vertical; outline:none;
  }
  .notes-panel textarea:focus{border-color:var(--teal);}
  .notes-panel textarea::placeholder{color:var(--placeholder-color);}

  /* Market Widget */
  .mkt-widget{
    display:flex; align-items:center; gap:12px; padding:12px; border-radius:10px;
    border:1px solid var(--line); background:var(--input-bg); cursor:pointer; margin-bottom:14px;
    transition:.15s;
  }
  .mkt-widget:hover{border-color:var(--teal);}
  .mkt-light{
    width:14px; height:14px; border-radius:50%; flex:0 0 14px;
    box-shadow:0 0 0 4px color-mix(in srgb, var(--lightcolor) 20%, transparent);
    background:var(--lightcolor);
  }
  .mkt-main{flex:1; min-width:0;}
  .mkt-status{font-family:'JetBrains Mono', monospace; font-weight:800; font-size:12px; letter-spacing:.03em; color:var(--lightcolor);}
  .mkt-idx-row{display:flex; gap:10px; margin-top:3px;}
  .mkt-idx{display:flex; align-items:center; gap:5px;}
  .mkt-idx-dot{width:8px; height:8px; border-radius:50%; background:var(--dotcolor);}
  .mkt-idx-label{font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--text-dim); font-weight:700;}

  /* Modals */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center; z-index:9000;
  }
  .modal{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:24px; box-shadow:0 24px 60px rgba(0,0,0,.5); width: 440px;
  }
  .modal h3{font-size:16px; font-weight:800; font-family:'JetBrains Mono', monospace; margin-bottom:18px; display:flex; align-items:center; gap:10px;}
  .modal h3 .dot{width:8px; height:8px; border-radius:50%; background:var(--amber);}
  .form-row{display:flex; gap:14px; margin-bottom:14px;}
  .form-field{flex:1;}
  .form-field label{
    display:block; font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:.05em; color:var(--text-dim);
    text-transform:uppercase; margin-bottom:6px; font-weight:600;
  }
  .form-field input, .form-field select{
    width:100%; background:var(--input-bg); border:1px solid var(--line); border-radius:7px;
    padding:10px 12px; color:var(--text); font-family:'Inter', sans-serif; font-size:13px; outline:none;
  }
  .form-field input:focus, .form-field select:focus{border-color:var(--teal);}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:24px;}
  .modal-cancel{
    background:transparent; border:1px solid var(--line); color:var(--text-dim);
    font-size:12.5px; font-weight:600; font-family:'JetBrains Mono', monospace; padding:9px 16px; border-radius:7px; cursor:pointer;
  }
  .modal-cancel:hover{color:var(--text); border-color:var(--text-faint);}

  /* Lightbox */
  .lightbox-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:9999;
    display:flex; align-items:center; justify-content:center; padding:30px; cursor:zoom-out;
  }
  .lightbox-backdrop img{
    max-width:96vw; max-height:90vh; object-fit:contain; border-radius:8px;
    box-shadow:0 24px 70px rgba(0,0,0,.6); cursor:default;
  }
  .lightbox-close{
    position:absolute; top:24px; right:30px; width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px;
  }
  .lightbox-close:hover{background:rgba(255,255,255,.25);}
  .lightbox-caption{
    position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
    font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:700; color:rgba(255,255,255,.9);
    background:rgba(0,0,0,.6); padding:8px 16px; border-radius:8px; border:1px solid rgba(255,255,255,.1);
  }
  
  /* Toast */
  .toast{
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px);
    opacity:0; pointer-events:none; z-index:9999;
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:12px 20px; font-family:'Inter', sans-serif; font-size:13px; font-weight:600; color:var(--text);
    box-shadow:0 14px 40px rgba(0,0,0,.4); display:flex; align-items:center; gap:10px;
    transition:opacity .2s ease, transform .2s ease; max-width:420px;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;}
  .toast-dot{width:8px; height:8px; border-radius:50%; flex:0 0 8px; background:var(--red);}
  .toast.ok .toast-dot{background:var(--teal);}
  
  .tag-picker-popover{
    position:fixed; z-index:8000; background:var(--panel); border:1px solid var(--line);
    border-radius:10px; padding:6px; min-width:180px; box-shadow:0 12px 40px rgba(0,0,0,.3);
    display:flex; flex-direction:column; gap:2px;
  }
  .tag-picker-opt{
    display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:6px; cursor:pointer;
    font-family:'Inter', sans-serif; font-size:12.5px; font-weight:600; color:var(--text);
  }
  .tag-picker-opt:hover{background:var(--input-bg);}
  .tag-picker-dot{width:10px; height:10px; border-radius:50%; flex:0 0 10px;}
  .tag-picker-name{color:var(--text-dim); font-weight:500;}

<div id="modalRoot"></div>

<script>
(function(){
  /* ============================================================
     THEME TOGGLE
     ============================================================ */
  function updateThemeToggleUI(){
    const theme = document.documentElement.getAttribute("data-theme") || "dark";
    document.getElementById("optDark").classList.toggle("active", theme==="dark");
    document.getElementById("optLight").classList.toggle("active", theme==="light");
  }
  function setTheme(theme){
    document.documentElement.setAttribute("data-theme", theme);
    updateThemeToggleUI();
    try{ localStorage.setItem('market-monitor-theme', theme); }catch(e){}
  }
  document.getElementById("optDark").addEventListener("click", ()=>setTheme("dark"));
  document.getElementById("optLight").addEventListener("click", ()=>setTheme("light"));

  function loadTheme(){
    try{
      const savedTheme = localStorage.getItem('market-monitor-theme');
      if(savedTheme) document.documentElement.setAttribute("data-theme", savedTheme);
    }catch(e){}
    updateThemeToggleUI();
  }

  /* ============================================================
     PLAYBOOK ENGINE
     ============================================================ */
  const LS_PREFIX = 'setuplog:';
  const hasNative = typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function';
  const Store = {
    mode: hasNative ? 'native' : 'local',
    async get(key, shared){
      if(hasNative) return await window.storage.get(key, shared);
      const raw = localStorage.getItem(LS_PREFIX + key);
      if(raw === null) throw new Error('key not found: ' + key);
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      if(hasNative){
        let lastErr;
        for(let attempt=0; attempt<3; attempt++){
          try{
            const res = await window.storage.set(key, value, shared);
            if(res) return res;
            lastErr = new Error('empty response from storage.set');
          }catch(e){ lastErr = e; }
          if(attempt < 2) await new Promise(r=>setTimeout(r, 350 * (attempt+1)));
        }
        throw lastErr;
      }
      localStorage.setItem(LS_PREFIX + key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      if(hasNative) return await window.storage.delete(key, shared);
      localStorage.removeItem(LS_PREFIX + key);
      return { key, deleted:true, shared: !!shared };
    }
  };

  let toastTimer = null;
  function showToast(msg, kind){
    let el = document.getElementById('toastEl');
    if(!el){
      el = document.createElement('div');
      el.id = 'toastEl';
      el.className = 'toast';
      document.body.appendChild(el);
    }
    el.innerHTML = `<span class="toast-dot"></span><span>${msg}</span>`;
    el.className = 'toast show' + (kind==='ok' ? ' ok' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=> el.classList.remove('show'), 4500);
  }

  function lightboxEscHandler(e){ if(e.key==='Escape') closeLightbox(); }
  function closeLightbox(){
    const el = document.getElementById('lightboxRoot');
    if(el) el.remove();
    document.removeEventListener('keydown', lightboxEscHandler);
  }
  function openLightbox(src, caption){
    closeLightbox();
    const el = document.createElement('div');
    el.id = 'lightboxRoot';
    el.className = 'lightbox-backdrop';
    el.innerHTML = `
      <button class="lightbox-close" id="lightboxCloseBtn" title="Close">✕</button>
      <img src="${src}" alt="${caption||'chart screenshot'}">
      ${caption ? `<div class="lightbox-caption">${caption}</div>` : ''}
    `;
    document.body.appendChild(el);
    el.addEventListener('click', (e)=>{ if(e.target===el) closeLightbox(); });
    document.getElementById('lightboxCloseBtn').addEventListener('click', closeLightbox);
    document.addEventListener('keydown', lightboxEscHandler);
  }

  function openCompareLightbox(t, beforeImg, afterImg){
    closeLightbox();
    const el = document.createElement('div');
    el.id = 'lightboxRoot';
    el.className = 'lightbox-backdrop';
    el.innerHTML = `
      <button class="lightbox-close" id="lightboxCloseBtn" title="Close">✕</button>
      <div class="compare-frame compare-mode" id="bigCompareFrame" style="width:min(94vw,1400px); height:86vh; border-radius:10px; background:var(--panel);">
        <div class="compare-layer after-layer"><img src="${afterImg}" alt="${t.ticker} after exit chart"></div>
        <div class="compare-layer before-layer" id="bigBeforeLayer" style="clip-path:inset(0 50% 0 0);"><img src="${beforeImg}" alt="${t.ticker} before entry chart"></div>
        <div class="compare-handle" id="bigCompareHandle" style="left:50%;"><div class="compare-grip">⇔</div></div>
        <div class="compare-badge badge-before"><span class="bdot" style="background:var(--blue);"></span>BEFORE</div>
        <div class="compare-badge badge-after"><span class="bdot" style="background:var(--teal);"></span>AFTER</div>
      </div>
      <div class="lightbox-caption">${t.ticker} · ${fmtDate(t.date)} — drag to compare</div>
    `;
    document.body.appendChild(el);
    el.addEventListener('click', (e)=>{ if(e.target===el) closeLightbox(); });
    document.getElementById('lightboxCloseBtn').addEventListener('click', closeLightbox);
    document.addEventListener('keydown', lightboxEscHandler);

    const frame = document.getElementById('bigCompareFrame');
    const beforeLayer = document.getElementById('bigBeforeLayer');
    const handle = document.getElementById('bigCompareHandle');
    const setPct = (clientX)=>{
      const rect = frame.getBoundingClientRect();
      let pct = ((clientX - rect.left) / rect.width) * 100;
      pct = Math.max(4, Math.min(96, pct));
      beforeLayer.style.clipPath = `inset(0 ${(100-pct).toFixed(2)}% 0 0)`;
      handle.style.left = pct.toFixed(2) + '%';
    };
    let dragging = false;
    frame.addEventListener('pointerdown', (e)=>{ dragging = true; try{ frame.setPointerCapture(e.pointerId); }catch(err){} setPct(e.clientX); });
    frame.addEventListener('pointermove', (e)=>{ if(dragging) setPct(e.clientX); });
    const stopDrag = ()=>{ dragging = false; };
    frame.addEventListener('pointerup', stopDrag);
    frame.addEventListener('pointercancel', stopDrag);
  }

  const DEFAULT_TAGS = {
    BO: { label:'BO', name:'Breakout', color:'#20d9b8' },
    EP: { label:'EP', name:'Episodic Pivot', color:'#38bdf8' },
    PS: { label:'PS', name:'Parabolic Short', color:'#ff5c72' },
    ER: { label:'ER', name:'Earnings Runner', color:'#f5b942' },
    MAN: { label:'MAN', name:'Manual', color:'#a855f7' },
  };
  const FALLBACK_TAG = { label:'—', name:'Untagged', color:'var(--text-faint)' };
  let TAGS = {};

  async function loadTags(){
    try{
      const res = await Store.get('tags-config', false);
      TAGS = res && res.value ? JSON.parse(res.value) : null;
    }catch(e){ TAGS = null; }
    if(!TAGS || Object.keys(TAGS).length===0){
      TAGS = JSON.parse(JSON.stringify(DEFAULT_TAGS));
      await saveTagsConfig();
    }
  }
  async function saveTagsConfig(){
    try{ await Store.set('tags-config', JSON.stringify(TAGS), false); }catch(e){ console.error(e); }
  }

  const SLOPE_OPTS = [['up','Sloping up'],['flat','Flattening'],['down','Sloping down']];
  const DEFAULT_MARKET = {
    qqq: { sma10:'', sma20:'', slope10:'up', slope20:'up' },
    spy: { sma10:'', sma20:'', slope10:'up', slope20:'up' },
    updated: ''
  };
  let market = JSON.parse(JSON.stringify(DEFAULT_MARKET));

  async function loadMarket(){
    try{
      const res = await Store.get('market-filter', false);
      market = res && res.value ? JSON.parse(res.value) : JSON.parse(JSON.stringify(DEFAULT_MARKET));
    }catch(e){ market = JSON.parse(JSON.stringify(DEFAULT_MARKET)); }
  }
  async function saveMarket(){
    try{ await Store.set('market-filter', JSON.stringify(market), false); }catch(e){ console.error(e); }
  }

  function indexLight(idx){
    if(idx.sma10==='' || idx.sma20==='' || idx.sma10===null || idx.sma20===null) return 'na';
    const s10 = Number(idx.sma10), s20 = Number(idx.sma20);
    if(s10 <= s20) return 'red';
    if(idx.slope10==='down' && idx.slope20==='down') return 'red';
    if(idx.slope10==='down' || idx.slope20==='down') return 'yellow';
    if(idx.slope10==='up' && idx.slope20==='up') return 'green';
    return 'yellow';
  }
  const LIGHT_RANK = { red:0, yellow:1, na:1, green:2 };
  const LIGHT_COLOR = { green:'var(--teal)', yellow:'var(--amber)', red:'var(--red)', na:'var(--text-faint)' };
  const LIGHT_STATUS = {
    green:{ text:'BREAKOUTS ON', sub:'10SMA > 20SMA, both trending up — risk-on' },
    yellow:{ text:'CAUTION', sub:'Averages flattening or 10SMA near 20SMA — trade lighter' },
    red:{ text:'BREAKOUTS OFF', sub:'10SMA below 20SMA or both sloping down — move to cash' },
    na:{ text:'NOT SET', sub:'Enter QQQ / SPY 10 & 20 SMA to activate the filter' },
  };
  function overallLight(){
    const q = indexLight(market.qqq), s = indexLight(market.spy);
    if(q==='na' && s==='na') return 'na';
    const worstRank = Math.min(LIGHT_RANK[q], LIGHT_RANK[s]);
    return Object.keys(LIGHT_RANK).find(k=>LIGHT_RANK[k]===worstRank && k!=='na') || 'yellow';
  }

  function renderMarketWidget(){
    const overall = overallLight();
    const status = LIGHT_STATUS[overall];
    const ql = indexLight(market.qqq), sl = indexLight(market.spy);
    document.getElementById('mktWidgetWrap').innerHTML = `
      <div class="mkt-widget" id="mktWidget" style="--lightcolor:${LIGHT_COLOR[overall]}">
        <div class="mkt-light"></div>
        <div class="mkt-main">
          <div class="mkt-status">${status.text}</div>
          <div class="mkt-idx-row">
            <div class="mkt-idx" style="--dotcolor:${LIGHT_COLOR[ql]}"><span class="mkt-idx-dot"></span><span class="mkt-idx-label">QQQ</span></div>
            <div class="mkt-idx" style="--dotcolor:${LIGHT_COLOR[sl]}"><span class="mkt-idx-dot"></span><span class="mkt-idx-label">SPY</span></div>
          </div>
        </div>
      </div>`;
    document.getElementById('mktWidget').addEventListener('click', openMarketModal);
  }

  function openMarketModal(){
    const root = document.getElementById('modalRoot');
    function block(key,label){
      const d = market[key];
      return `
        <div style="border:1px solid var(--line); border-radius:8px; padding:12px; margin-bottom:12px; background:var(--panel2);">
          <div style="font-family:'JetBrains Mono', monospace; font-weight:700; font-size:11.5px; margin-bottom:12px; color:var(--text);">${label}</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div class="form-field"><label>10-day SMA</label><input data-idx="${key}" data-field="sma10" type="number" step="0.01" value="${d.sma10}" placeholder="e.g. 512.30"></div>
            <div class="form-field"><label>20-day SMA</label><input data-idx="${key}" data-field="sma20" type="number" step="0.01" value="${d.sma20}" placeholder="e.g. 505.10"></div>
            <div class="form-field"><label>10-day slope</label>
              <select data-idx="${key}" data-field="slope10">
                ${SLOPE_OPTS.map(([v,l])=>`<option value="${v}" ${d.slope10===v?'selected':''}>${l}</option>`).join('')}
              </select>
            </div>
            <div class="form-field"><label>20-day slope</label>
              <select data-idx="${key}" data-field="slope20">
                ${SLOPE_OPTS.map(([v,l])=>`<option value="${v}" ${d.slope20===v?'selected':''}>${l}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>`;
    }
    root.innerHTML = `
      <div class="modal-backdrop" id="mktBackdrop">
        <div class="modal" style="width:480px;">
          <h3><span class="dot"></span>Market filter</h3>
          <p style="font-size:12px; color:var(--text-dim); line-height:1.6; margin-bottom:18px;">
            Enter the current 10-day and 20-day SMA values for QQQ and SPY, plus how each average is sloping. Whichever index is worse sets the overall light.
          </p>
          ${block('qqq','QQQ — Nasdaq 100')}
          ${block('spy','SPY — S&amp;P 500')}
          <div style="padding:10px 12px; border-radius:8px; background:var(--input-bg); font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:700; margin-top:16px;" id="mktPreview"></div>
          <div class="modal-actions">
            <button class="modal-cancel" id="mktCancelBtn">Close</button>
            <button class="btn primary" id="mktSaveBtn">Save</button>
          </div>
        </div>
      </div>`;
    function updatePreview(){
      const q = indexLight(market.qqq), s = indexLight(market.spy);
      const o = overallLight();
      document.getElementById('mktPreview').style.color = LIGHT_COLOR[o];
      document.getElementById('mktPreview').textContent = `Preview → QQQ: ${q.toUpperCase()}  ·  SPY: ${s.toUpperCase()}  ·  Overall: ${LIGHT_STATUS[o].text}`;
    }
    root.querySelectorAll('[data-idx]').forEach(el=>{
      el.addEventListener('input', ()=>{
        market[el.dataset.idx][el.dataset.field] = el.value;
        updatePreview();
      });
    });
    updatePreview();
    document.getElementById('mktBackdrop').addEventListener('click', (e)=>{ if(e.target.id==='mktBackdrop') closeModal(); });
    document.getElementById('mktCancelBtn').addEventListener('click', ()=>{ closeModal(); renderMarketWidget(); });
    document.getElementById('mktSaveBtn').addEventListener('click', async ()=>{
      market.updated = new Date().toISOString();
      await saveMarket();
      closeModal();
      renderMarketWidget();
    });
  }

  let trades = [];
  let selectedId = null;
  let activeFilter = 'ALL';
  let sortMode = 'gain_desc';
  let searchTerm = '';

  const tradeListEl = document.getElementById('tradeList');
  const detailEl = document.getElementById('detail');
  const countPill = document.getElementById('countPill');
  const filterRow = document.getElementById('filterRow');

  function uid(){ return 't_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  async function loadTrades(){
    try{
      const res = await Store.get('trades-list', false);
      trades = res && res.value ? JSON.parse(res.value) : [];
    }catch(e){ trades = []; }
  }
  let saveTradesChain = Promise.resolve();
  function saveTrades(){
    saveTradesChain = saveTradesChain.then(async ()=>{
      try{
        const payload = JSON.stringify(trades);
        await Store.set('trades-list', payload, false);
      }catch(e){ console.error(e); }
    });
    return saveTradesChain;
  }
  async function getImage(id, slot){
    try{
      const res = await Store.get('image:'+slot+':'+id, false);
      return res ? res.value : null;
    }catch(e){ return null; }
  }
  async function setImage(id, slot, dataUrl){
    try{ await Store.set('image:'+slot+':'+id, dataUrl, false); }catch(e){ console.error(e); }
  }
  async function deleteImage(id){
    try{ await Store.delete('image:before:'+id, false); }catch(e){}
    try{ await Store.delete('image:after:'+id, false); }catch(e){}
  }

  function fmtGain(v){
    if(v===null||v===undefined||v==='') return '—';
    const n = Number(v);
    const sign = n>0?'+':'';
    return sign + n.toFixed(1) + '%';
  }
  function fmtDate(d){
    if(!d) return '';
    const dt = new Date(d+'T00:00:00');
    if(isNaN(dt)) return d;
    return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  }

  function computeDerived(t){
    const entry = parseFloat(t.entry);
    const stop = parseFloat(t.stop);
    if(Number.isFinite(entry) && Number.isFinite(stop) && entry > 0){
      t.riskPct = ((entry - stop) / entry * 100).toFixed(2);
    }
    const exitPrice = parseFloat(t.exitPrice);
    if(Number.isFinite(entry) && Number.isFinite(exitPrice) && entry > 0){
      t.gainPct = ((exitPrice - entry) / entry * 100).toFixed(2);
    }
    const gain = parseFloat(t.gainPct);
    const risk = parseFloat(t.riskPct);
    if(Number.isFinite(gain) && Number.isFinite(risk) && risk !== 0){
      t.rMultiple = (gain / risk).toFixed(2);
    }
    const low = parseFloat(t.lowPrice);
    if(Number.isFinite(entry) && Number.isFinite(low) && entry > 0){
      t.mae = ((low - entry) / entry * 100).toFixed(2);
    }
    const high = parseFloat(t.highPrice);
    if(Number.isFinite(entry) && Number.isFinite(high) && entry > 0){
      t.mfe = ((high - entry) / entry * 100).toFixed(2);
    }
    if(t.entryDate && t.exitDate){
      const d1 = new Date(t.entryDate+'T00:00:00');
      const d2 = new Date(t.exitDate+'T00:00:00');
      if(!isNaN(d1) && !isNaN(d2)){
        const days = Math.round((d2 - d1) / 86400000);
        if(days >= 0) t.holdDays = String(days);
      }
    }
  }

  function closeTagPicker(){
    const el = document.getElementById('tagPickerPopover');
    if(el) el.remove();
    document.removeEventListener('click', tagPickerOutsideHandler, true);
  }
  function tagPickerOutsideHandler(e){
    const el = document.getElementById('tagPickerPopover');
    if(el && !el.contains(e.target)) closeTagPicker();
  }
  function openTagPicker(triggerEl, trade){
    closeTagPicker();
    const rect = triggerEl.getBoundingClientRect();
    const pop = document.createElement('div');
    pop.id = 'tagPickerPopover';
    pop.className = 'tag-picker-popover';
    const keys = Object.keys(TAGS);
    pop.innerHTML = keys.map(k=>`
      <div class="tag-picker-opt" data-key="${k}">
        <span class="tag-picker-dot" style="background:${TAGS[k].color}"></span>
        <span>${TAGS[k].label}</span><span class="tag-picker-name">${TAGS[k].name}</span>
      </div>`).join('');
    document.body.appendChild(pop);
    const popRect = pop.getBoundingClientRect();
    let top = rect.bottom + 6, left = rect.left;
    if(top + popRect.height > window.innerHeight) top = rect.top - popRect.height - 6;
    if(left + popRect.width > window.innerWidth) left = window.innerWidth - popRect.width - 8;
    pop.style.top = top + 'px';
    pop.style.left = left + 'px';
    pop.querySelectorAll('.tag-picker-opt').forEach(opt=>{
      opt.addEventListener('click', async (e)=>{
        e.stopPropagation();
        trade.tag = opt.dataset.key;
        await saveTrades();
        closeTagPicker();
        renderList();
        renderDetail();
      });
    });
    setTimeout(()=> document.addEventListener('click', tagPickerOutsideHandler, true), 0);
  }

  function renderFilters(){
    if(activeFilter!=='ALL' && !TAGS[activeFilter]) activeFilter='ALL';
    const keys = ['ALL', ...Object.keys(TAGS)];
    filterRow.innerHTML = keys.map(k=>{
      const label = k==='ALL' ? 'ALL' : TAGS[k].label;
      const active = activeFilter===k ? 'active':'';
      const style = k==='ALL' ? '' : `style="--tagcolor:${TAGS[k].color}"`;
      return `<button class="chip ${active}" data-filter="${k}" ${style}>${label}</button>`;
    }).join('') + `<button class="chip chip-manage" id="manageTagsBtn" title="Add or remove setup tags">⚙</button>`;
    filterRow.querySelectorAll('.chip[data-filter]').forEach(c=>{
      c.addEventListener('click', ()=>{ activeFilter = c.dataset.filter; renderList(); });
    });
    document.getElementById('manageTagsBtn').addEventListener('click', openManageTagsModal);
  }

  function getFilteredSorted(){
    let list = trades.filter(t=>{
      if(activeFilter!=='ALL' && t.tag!==activeFilter) return false;
      if(searchTerm && !t.ticker.toLowerCase().includes(searchTerm.toLowerCase())) return false;
      return true;
    });
    const num = (v)=> v===undefined||v===null||v==='' ? -Infinity : Number(v);
    switch(sortMode){
      case 'gain_desc': list.sort((a,b)=> num(b.gainPct)-num(a.gainPct)); break;
      case 'gain_asc': list.sort((a,b)=> num(a.gainPct)-num(b.gainPct)); break;
      case 'date_desc': list.sort((a,b)=> (b.date||'').localeCompare(a.date||'')); break;
      case 'date_asc': list.sort((a,b)=> (a.date||'').localeCompare(b.date||'')); break;
      case 'ticker': list.sort((a,b)=> a.ticker.localeCompare(b.ticker)); break;
      case 'r_desc': list.sort((a,b)=> num(b.rMultiple)-num(a.rMultiple)); break;
    }
    return list;
  }

  function renderList(){
    const list = getFilteredSorted();
    countPill.textContent = trades.length + (trades.length===1?' setup':' setups');
    if(list.length===0){
      tradeListEl.innerHTML = `<div class="empty-list">No setups match.<br>Add one with the button above.</div>`;
      return;
    }
    const maxR = Math.max(1, ...trades.map(t=> Math.abs(Number(t.rMultiple))||0));
    tradeListEl.innerHTML = list.map(t=>{
      const tagInfo = TAGS[t.tag] || FALLBACK_TAG;
      const gainNum = Number(t.gainPct);
      const gainClass = gainNum >= 0 ? 'pos':'neg';

    function wireCompareFrame(beforeImg, afterImg){
      const frame = document.getElementById('compareFrame');
      const fileInputBefore = document.getElementById('fileInputBefore');
      const fileInputAfter = document.getElementById('fileInputAfter');

      if(frame.classList.contains('compare-mode')){
        const beforeLayer = document.getElementById('beforeLayer');
        const handle = document.getElementById('compareHandle');
        const setPct = (clientX)=>{
          const rect = frame.getBoundingClientRect();
          let pct = ((clientX - rect.left) / rect.width) * 100;
          pct = Math.max(4, Math.min(96, pct));
          beforeLayer.style.clipPath = `inset(0 ${(100-pct).toFixed(2)}% 0 0)`;
          handle.style.left = pct.toFixed(2) + '%';
        };
        let dragging = false;
        frame.addEventListener('pointerdown', (e)=>{
          if(e.target.closest('.compare-action-btn') || e.target.closest('.compare-expand-btn')) return;
          dragging = true;
          try{ frame.setPointerCapture(e.pointerId); }catch(err){}
          setPct(e.clientX);
        });
        frame.addEventListener('pointermove', (e)=>{ if(dragging) setPct(e.clientX); });
        const stopDrag = ()=>{ dragging = false; };
        frame.addEventListener('pointerup', stopDrag);
        frame.addEventListener('pointercancel', stopDrag);

        frame.querySelectorAll('.compare-action-btn').forEach(btn=>{
          btn.addEventListener('pointerdown', e=> e.stopPropagation());
          btn.addEventListener('click', (e)=>{
            e.stopPropagation();
            (btn.dataset.slot==='before' ? fileInputBefore : fileInputAfter).click();
          });
        });
        const expandBtn = document.getElementById('compareExpandBtn');
        expandBtn.addEventListener('pointerdown', e=> e.stopPropagation());
        expandBtn.addEventListener('click', (e)=>{
          e.stopPropagation();
          openCompareLightbox(t, beforeImg, afterImg);
        });
      } else {
        frame.querySelectorAll('.split-half').forEach(half=>{
          const slot = half.dataset.slot;
          const fileInput = slot==='before' ? fileInputBefore : fileInputAfter;
          const img = half.querySelector('img');
          if(img){
            const label = slot==='before' ? 'Before entry' : 'After exit';
            img.addEventListener('click', ()=> openLightbox(img.src, `${t.ticker} — ${label} · ${fmtDate(t.date)}`));
          } else {
            half.addEventListener('click', ()=> fileInput.click());
          }
          ['dragenter','dragover'].forEach(ev=> half.addEventListener(ev, e=>{ e.preventDefault(); half.classList.add('dragover'); }));
          ['dragleave','drop'].forEach(ev=> half.addEventListener(ev, e=>{ e.preventDefault(); half.classList.remove('dragover'); }));
          half.addEventListener('drop', e=>{
            const f = e.dataTransfer.files && e.dataTransfer.files[0];
            if(f) handleImageFile(f, t.id, slot);
          });
        });
      }

      fileInputBefore.addEventListener('change', e=>{ const f = e.target.files[0]; if(f) handleImageFile(f, t.id, 'before'); });
      fileInputAfter.addEventListener('change', e=>{ const f = e.target.files[0]; if(f) handleImageFile(f, t.id, 'after'); });
    }
    
    async function mountCompareFrame(){
      const [beforeImg, afterImg] = await Promise.all([getImage(t.id,'before'), getImage(t.id,'after')]);
      document.getElementById('chartArea').innerHTML = renderCompareFrame(beforeImg, afterImg);
      wireCompareFrame(beforeImg, afterImg);

    mountCompareFrame();

    document.getElementById('deleteBtn').addEventListener('click', ()=> openDeleteModal(t));
    document.querySelector('.dh-tag').addEventListener('click', (e)=> openTagPicker(e.currentTarget, t));

    document.querySelectorAll('.stat-cell input').forEach(inp=>{
      if(inp.readOnly) return;
      let locked = false;
      const commit = async ()=>{
        if(locked) return; 
        locked = true;
        t[inp.dataset.key] = inp.value;
        computeDerived(t);
        await saveTrades();
        renderDetail();
        renderList();
      };
      if(inp.type==='date'){ inp.addEventListener('change', commit); } 
      else { inp.addEventListener('blur', commit); inp.addEventListener('keydown', e=>{ if(e.key==='Enter') inp.blur(); }); }
    });
    document.querySelectorAll('.metric-cell input').forEach(inp=>{
      inp.addEventListener('blur', async ()=>{ t[inp.dataset.metric] = inp.value; await saveTrades(); });
      inp.addEventListener('keydown', e=>{ if(e.key==='Enter') inp.blur(); });
    });
    document.getElementById('notesArea').addEventListener('blur', async ()=>{
      t.notes = document.getElementById('notesArea').value;
      await saveTrades();
    });
  }

  const MAX_IMAGE_BYTES = 4 * 1024 * 1024;
  function dataUrlBytes(dataUrl){
    const b64 = dataUrl.split(',')[1] || '';
    return Math.ceil(b64.length * 3 / 4);
  }
  function handleImageFile(file, tradeId, slot){
    if(!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = async ()=>{
        const attempts = [
          { maxW:1400, q:0.85 },
          { maxW:1200, q:0.75 },
          { maxW:1000, q:0.65 },
          { maxW:800,  q:0.6  }
        ];
        let dataUrl = null;
        for(const cfg of attempts){
          let w = img.width, h = img.height;
          if(w > cfg.maxW){ h = Math.round(h * cfg.maxW / w); w = cfg.maxW; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          const candidate = canvas.toDataURL('image/jpeg', cfg.q);
          if(dataUrlBytes(candidate) <= MAX_IMAGE_BYTES){ dataUrl = candidate; break; }
          dataUrl = candidate; 
        }
        if(dataUrlBytes(dataUrl) > MAX_IMAGE_BYTES){
          showToast(`Image is too large (~${(dataUrlBytes(dataUrl)/1024/1024).toFixed(1)}MB). Try a smaller screenshot.`);
          return;
        }
        await setImage(tradeId, slot, dataUrl);
        renderDetail();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

    const root = document.getElementById('modalRoot');
    root.innerHTML = `
      <div class="modal-backdrop" id="importBackdrop">
        <div class="modal" style="width:400px;">
          <h3><span class="dot" style="background:var(--blue);"></span>Import backup</h3>
          <p style="font-size:12.5px; color:var(--text-dim); line-height:1.65; margin-bottom:18px;">
            This file contains <strong style="color:var(--text);">${parsed.trades.length} trades</strong>. Importing will <strong style="color:var(--red);">replace all data in this app</strong>.
          </p>
          <div class="modal-actions">
            <button class="modal-cancel" id="importCancelBtn">Cancel</button>
            <button class="btn" id="importConfirmBtn" style="background:var(--blue); color:#fff; border:none;">Replace with backup</button>
          </div>
        </div>
      </div>`;
    document.getElementById('importBackdrop').addEventListener('click', (e)=>{ if(e.target.id==='importBackdrop') closeModal(); });
    document.getElementById('importCancelBtn').addEventListener('click', closeModal);
    document.getElementById('importConfirmBtn').addEventListener('click', async ()=>{
      closeModal();
      showToast('Importing…', 'ok');
      trades = parsed.trades || [];
      if(parsed.tags) TAGS = parsed.tags;
      if(parsed.market) market = parsed.market;
      
      await saveTrades(); await saveTagsConfig(); await saveMarket();
      if(parsed.theme) setTheme(parsed.theme);

      if(parsed.images){
        for(const key of Object.keys(parsed.images)){
          const idx = key.lastIndexOf(':');
          try{ await setImage(key.slice(0, idx), key.slice(idx+1), parsed.images[key]); }catch(e){}
        }
      }
      selectedId = null;
      renderMarketWidget(); renderFilters(); renderList(); renderDetail();
    });
  }

  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importBtn').addEventListener('click', triggerImport);
  document.getElementById('importFileInput').addEventListener('change', (e)=>{
    if(e.target.files[0]) handleImportFile(e.target.files[0]);
    e.target.value = '';
  });

  async function init(){
    loadTheme();
    await loadTags();
    await loadMarket();
    await loadTrades();
    await seedIfEmpty();
    renderMarketWidget();
    renderFilters();
    renderList();
    renderDetail();
  }
  init();
})();
</script>
</body>
</html>

                    <div class="flex items-center gap-x-1.5"><span class="w-2 h-2 bg-violet-500 rounded-full"></span> Improving</div>
                </div>

                <button class="text-xs px-3 py-1 bg-slate-100 hover:bg-slate-200 rounded-2xl">+ Add</button>
            </div>
            <div id="sectorList" class="space-y-1"></div>
        </div>

    </div>
</div>
